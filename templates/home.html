<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Performance Predictor</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:10px;
            width:450px;
            box-shadow:0px 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            font-weight:bold;
        }

        input, select{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border-radius:5px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:12px;
            background:#667eea;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#5a67d8;
        }
    </style>
</head>

<body>

<div class="container">

<h1>Student Performance Prediction</h1>

<form action="/predict" method="post">

<label>Gender</label>
<select name="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Race_Ethnicity</label>
<select name="race_ethnicity">
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>
</select>

<label>Parental Level of Education</label>
<select name="parental_level_of_education">
<option value="some high school">Some High School</option>
<option value="high school">High School</option>
<option value="associate's degree">Associate's Degree</option>
<option value="bachelor's degree">Bachelor's Degree</option>
<option value="master's degree">Master's Degree</option>
</select>

<label>Lunch</label>
<select name="lunch">
<option value="standard">Standard</option>
<option value="free/reduced">Free/Reduced</option>
</select>

<label>Test Preparation Course</label>
<select name="test_preparation_course">
<option value="none">None</option>
<option value="completed">Completed</option>
</select>

<label>Reading Score</label>
<input type="number" name="reading_score" required>

<label>Writing Score</label>
<input type="number" name="writing_score" required>

<button type="submit">Predict Math Score</button>

</form>
{% if result %}
<h2>THE prediction is {{result}}</h2>
{% endif %}

</div>

</body>
</html>
